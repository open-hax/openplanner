packages:
  # Production packages — always built and tested
  - './app/*'
  - 'packages/**'

  # Pseudo packages that are real workspace dependencies
  # (the rest of pseudo/ is scratch/notes/reference — excluded from builds)
  - 'pseudo/opencode-cljs-client'
  - 'pseudo/openplanner-cljs-client'
  - 'pseudo/test-utils'
  - 'pseudo/logger'

  # Archive packages that are real workspace dependencies
  # (the rest of archive/ is frozen/legacy — excluded from builds)
  - 'archive/event'
